<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Mogotor server analytics">
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(600 180) scale(520 300)">
      <stop offset="0" stop-color="#ff5e00" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#0a0b0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0b0f"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5e00" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ff5e00" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <text x="600" y="168" fill="#f2f2f7" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="700" text-anchor="middle">Mogotor</text>
  <text x="600" y="218" fill="#9aa3b2" font-family="Segoe UI, Arial, sans-serif" font-size="24" letter-spacing="0.5" text-anchor="middle">Server analytics - last 24 hours</text>

  <rect x="140" y="270" width="920" height="280" rx="20" fill="rgba(0,0,0,0.42)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="180" y1="360" x2="1020" y2="360"/>
    <line x1="180" y1="400" x2="1020" y2="400"/>
    <line x1="180" y1="440" x2="1020" y2="440"/>
    <line x1="180" y1="480" x2="1020" y2="480"/>
  </g>

  <path
    d="M 180 468
       C 240 468, 260 430, 320 438
       C 380 446, 400 412, 460 420
       C 520 428, 540 395, 600 402
       C 660 409, 680 378, 740 386
       C 800 394, 820 362, 880 370
       C 940 378, 960 348, 1020 356
       L 1020 508 L 180 508 Z"
    fill="url(#area)"/>

  <path
    d="M 180 468
       C 240 468, 260 430, 320 438
       C 380 446, 400 412, 460 420
       C 520 428, 540 395, 600 402
       C 660 409, 680 378, 740 386
       C 800 394, 820 362, 880 370
       C 940 378, 960 348, 1020 356"
    fill="none"
    stroke="#ff5e00"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
